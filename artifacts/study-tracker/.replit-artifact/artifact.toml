kind = "web"
previewPath = "/"
title = "Study Tracker"
version = "1.0.0"
id = "artifacts/study-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23521

[services.development]
run = "pnpm --filter @workspace/study-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-tracker", "run", "build" ]
publicDir = "artifacts/study-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23521"
BASE_PATH = "/"
